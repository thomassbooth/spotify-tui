<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Auth</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #191414;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        p {
            color: #b3b3b3;
            font-size: 1.1rem;
        }
        .close-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 12px 32px;
            background: #1db954;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .close-btn:hover {
            background: #1ed760;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authenticated!</h1>
        <p>You can now close this tab and return to the terminal.</p>
        <button class="close-btn" onclick="window.close()">Close Window</button>
    </div>
    <script>window.close();</script>
</body>
</html>
